  // ── Export ────────────────────────────────────────────────────────────────
  window.exportData = function() {
    const raw  = localStorage.getItem(KEY) || '{"habits":[]}';
    const blob = new Blob([raw], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `habits-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    closeSettingsSheet();
    showToast('✅ Backup downloaded!');
  };

  // ── Import ────────────────────────────────────────────────────────────────
  window.importData = function() {
    const input    = document.createElement('input');
    input.type     = 'file';
    input.accept   = '.json,application/json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.habits || !Array.isArray(data.habits))
            throw new Error('bad format');
          const current = load().habits.length;
          const incoming = data.habits.length;
          if (!confirm(`Replace your current ${current} habit${current !== 1 ? 's' : ''} with ${incoming} habit${incoming !== 1 ? 's' : ''} from this backup?`))
            return;
          localStorage.setItem(KEY, JSON.stringify(data));
          closeSettingsSheet();
          render();
          showToast(`✅ ${incoming} habit${incoming !== 1 ? 's' : ''} restored!`);
        } catch {
          showToast('❌ Invalid backup file');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  // ── Cycle habit type (tap chip on card) ──────────────────────────────────
  window.cycleHabitType = function(id) {
    const data  = load();
    const h     = data.habits.find(x => x.id === id);
    if (!h) return;
    const order = ['daily', 'weekly', 'monthly'];
    const LABELS = { daily: '☀️ Daily', weekly: '📅 Weekly', monthly: '🗓 Monthly' };
    h.type = order[(order.indexOf(h.type || 'daily') + 1) % 3];
    save(data);
    render();
    showToast(`${LABELS[h.type]}`);
  };

  // ── Habit type selector / home filter ────────────────────────────────────
  window.setHabitType = function(type) {
    homeFilter = type;
    if (type !== 'all') {
      pendingType   = type;
      pendingTarget = 1; // reset target when switching type
    }
    updateTargetPickerRow();
    render();
  };

  function updateTargetPickerRow() {
    const row = document.getElementById('target-picker-row');
    if (!row) return;
    const show = (pendingType === 'weekly' || pendingType === 'monthly') && homeFilter !== 'all';
    row.style.display = show ? 'flex' : 'none';
    if (show) {
      const unit = pendingType === 'weekly' ? 'week' : 'month';
      document.getElementById('pending-target-label').textContent = `${pendingTarget} × / ${unit}`;
      document.getElementById('pending-minus').disabled = pendingTarget <= 1;
      const max = pendingType === 'weekly' ? 7 : 31;
      document.getElementById('pending-plus').disabled  = pendingTarget >= max;
    }
  }

  window.changePendingTarget = function(delta) {
    const max = pendingType === 'weekly' ? 7 : 31;
    pendingTarget = Math.max(1, Math.min(max, pendingTarget + delta));
    updateTargetPickerRow();
  };

  // ── Target edit sheet ────────────────────────────────────────────────────
  window.showTargetSheet = function(id) {
    const data = load();
    const h    = data.habits.find(x => x.id === id);
    if (!h) return;
    targetEditId      = id;
    sheetTargetValue  = h.target || 1;
    const unit        = h.type === 'monthly' ? 'times / month' : 'times / week';
    const max         = h.type === 'monthly' ? 31 : 7;
    document.getElementById('target-sheet-title').textContent = `Target for ${h.emoji || getHabitEmoji(h.name)} ${h.name}`;
    document.getElementById('sheet-target-count').textContent = sheetTargetValue;
    document.getElementById('sheet-target-unit').textContent  = unit;
    document.getElementById('sheet-minus').disabled = sheetTargetValue <= 1;
    document.getElementById('sheet-plus').disabled  = sheetTargetValue >= max;
    document.getElementById('target-sheet').classList.add('show');
    document.getElementById('target-overlay').classList.add('show');
  };

  window.closeTargetSheet = function() {
    document.getElementById('target-sheet').classList.remove('show');
    document.getElementById('target-overlay').classList.remove('show');
    targetEditId = null;
  };

  window.changeSheetTarget = function(delta) {
    const data = load();
    const h    = data.habits.find(x => x.id === targetEditId);
    const max  = h && h.type === 'monthly' ? 31 : 7;
    sheetTargetValue = Math.max(1, Math.min(max, sheetTargetValue + delta));
    document.getElementById('sheet-target-count').textContent = sheetTargetValue;
    document.getElementById('sheet-minus').disabled = sheetTargetValue <= 1;
    document.getElementById('sheet-plus').disabled  = sheetTargetValue >= max;
  };

  window.saveTargetEdit = function() {
    if (!targetEditId) return;
    const data = load();
    const h    = data.habits.find(x => x.id === targetEditId);
    if (!h) return;
    h.target = sheetTargetValue;
    save(data);
    closeTargetSheet();
    render();
    showToast(`Target set to ${sheetTargetValue}×`);
  };

  // ── Stats view ────────────────────────────────────────────────────────────
  function renderStatsView(data) {
    const el = document.getElementById('stats-content');
    if (!el) return;

    if (!data.habits.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>Add some habits and start tracking to see your all-time stats!</p></div>`;
      return;
    }

    const td = todayStr();
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // ── Highlights ─────────────────────────────────────────────────────────
    let allTimeBest = 0, allTimeTotal = 0;
    let mostConsistentHabit = null, bestRate = -1;
    const uniqueDays = new Set();

    data.habits.forEach(h => {
      const dates = h.dates || [];
      allTimeTotal += dates.length;
      dates.forEach(ds => uniqueDays.add(ds));

      const best = calcBestStreak(dates);
      if (best > allTimeBest) allTimeBest = best;

      const created = h.createdAt || td;
      const daysSince = Math.max(1, Math.round(
        (new Date(td + 'T12:00:00') - new Date(created + 'T12:00:00')) / 86400000
      ) + 1);
      const rate = dates.length / daysSince;
      if (rate > bestRate) { bestRate = rate; mostConsistentHabit = h; }
    });

    const activeDays         = uniqueDays.size;
    const mostConsistentRate = Math.round(bestRate * 100);
    const mcEmoji            = mostConsistentHabit
      ? (mostConsistentHabit.emoji || getHabitEmoji(mostConsistentHabit.name)) : '';

    // ── Last 8 weeks trend ────────────────────────────────────────────────
    const TREND_WEEKS = 8;
    const MAX_BAR_PX  = 90;
    const trendData   = [];
    for (let offset = -(TREND_WEEKS - 1); offset <= 0; offset++) {
      const week       = getWeekDays(offset);
      const isThisWeek = offset === 0;
      let done = 0, applicable = 0;
      data.habits.forEach(h => {
        const dates   = new Set(h.dates || []);
        const created = h.createdAt || '1970-01-01';
        week.forEach(ds => {
          if (ds > td || ds < created) return;
          applicable++;
          if (dates.has(ds)) done++;
        });
      });
      const pct  = applicable > 0 ? Math.round(done / applicable * 100) : null;
      const mon  = new Date(week[0] + 'T12:00:00');
      const lbl  = mon.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const barPx = pct !== null ? Math.max(4, Math.round(pct / 100 * MAX_BAR_PX)) : 4;
      trendData.push({ pct, lbl, isThisWeek, barPx });
    }

    const trendHtml = `
      <div class="trend-bars">
        ${trendData.map(w => {
          const cls = w.isThisWeek ? 'this-week' : (w.pct !== null ? 'has-data' : 'no-data');
          return `<div class="trend-col">
            ${w.pct !== null ? `<div class="trend-pct">${w.pct}%</div>` : ''}
            <div class="trend-bar ${cls}" style="height:${w.barPx}px"></div>
          </div>`;
        }).join('')}
      </div>
      <div class="trend-labels">
        ${trendData.map(w => `<div class="trend-lbl${w.isThisWeek ? ' this-week' : ''}">${w.lbl}</div>`).join('')}
      </div>`;

    // ── Per-habit breakdown ────────────────────────────────────────────────
    const breakdownHtml = data.habits.map(h => {
      const p       = PALETTE[h.colorIdx ?? 0];
      const emoji   = h.emoji || getHabitEmoji(h.name);
      const best    = calcBestStreak(h.dates || []);
      const cur     = calcStreakByType(h);
      const unit    = streakUnit(h);
      const total   = (h.dates || []).length;
      const created = h.createdAt || td;
      const daysSince = Math.max(1, Math.round(
        (new Date(td + 'T12:00:00') - new Date(created + 'T12:00:00')) / 86400000
      ) + 1);
      const rate = Math.round(total / daysSince * 100);
      return `<div class="hb-row" style="background:${p.grad}">
        <div class="hb-emoji">${emoji}</div>
        <div class="hb-info">
          <div class="hb-name">${esc(h.name)}</div>
          <div class="hb-stats">
            <span class="hb-stat">🔥 Now <strong>${cur}${unit}</strong></span>
            <span class="hb-stat">🏆 Best <strong>${best}d</strong></span>
            <span class="hb-stat">✓ <strong>${total}</strong> total</span>
          </div>
        </div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="sts-highlights">
        <div class="sts-card">
          <div class="sts-icon">🏆</div>
          <div class="sts-val">${allTimeBest}<span class="sts-val-sup">d</span></div>
          <div class="sts-lbl">Best Streak Ever</div>
        </div>
        <div class="sts-card">
          <div class="sts-icon">✅</div>
          <div class="sts-val">${allTimeTotal}</div>
          <div class="sts-lbl">Total Completions</div>
        </div>
        <div class="sts-card">
          <div class="sts-icon">🎯</div>
          <div class="sts-val">${mostConsistentRate}<span class="sts-val-sup">%</span></div>
          <div class="sts-sub">${mcEmoji} ${esc(mostConsistentHabit?.name || '')}</div>
          <div class="sts-lbl">Most Consistent</div>
        </div>
        <div class="sts-card">
          <div class="sts-icon">📅</div>
          <div class="sts-val">${activeDays}</div>
          <div class="sts-lbl">Active Days</div>
        </div>
      </div>

      <p class="sts-section-title">Completion — Last 8 Weeks</p>
      <div class="trend-chart">${trendHtml}</div>

      <p class="sts-section-title">Habit Breakdown</p>
      <div class="habit-breakdown">${breakdownHtml}</div>
    `;
  }

  render();
</script>
</body>
</html>
